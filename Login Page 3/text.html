<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page 3</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <div class="container">
        <div class="title">
            <h3>Login</h3>
        </div>
        <div class="box1">
            <i class="fa-regular fa-user icon1"></i>
            <input type="text" class="name" name="name" placeholder="Username">
        </div>
        <div class="box2">
            <i class="fa-solid fa-unlock icon2"></i>
            <input type="password" class="password" name="password" placeholder="password">
        </div>
        <div class="remember">
            <input type="checkbox" name="remember me">Remember me</input>
        </div>
        <div class="login">
            LOG IN
        </div>
        <div class="password2">
            Forget Password
        </div>
        <div class="sign">
            <div>
                Not a member?
            </div>
            <div class="signup">
                Sign up now
            </div>
        </div>

    </div>
</body>

</html>
